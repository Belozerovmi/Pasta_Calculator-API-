<!doctype html>
<html lang="ru">
  <head>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="favicon.ico" type="image/x-icon" />
    <!-- <link rel="apple-touch-icon" sizes="180x180" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="512x512" href="favicon.ico" /> -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <title>MacroCalc — Калькулятор порций</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="flex-between" style="margin-bottom: 8px">
        <a href="index.html">
          <img src="food-fusilli-pasta-reginette-svgrepo-com.svg" alt="logo" />
          <h1>MacroCalc</h1>
        </a>
      </div>
      <div class="subhead">Рассчитайте вес сухих макарон в порции</div>

      <!-- Карточка продукта -->
      <div class="product-card">
        <div class="product-name-row">
          <span class="product-name" id="productName"
            >Макароны (твёрдые сорта)</span
          >
          <button class="edit-link" id="editProductBtn">
            <svg
              class="icon-svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"
              />
            </svg>
          </button>
        </div>
        <div class="nutrients" id="nutrientsPanel">
          <div class="nutrient">
            <div class="nutrient-value" id="kcalVal">354</div>
            <div class="nutrient-label">ккал</div>
          </div>
          <div class="nutrient">
            <div class="nutrient-value" id="proteinVal">12.0</div>
            <div class="nutrient-label">белки, г</div>
          </div>
          <div class="nutrient">
            <div class="nutrient-value" id="fatVal">1.5</div>
            <div class="nutrient-label">жиры, г</div>
          </div>
          <div class="nutrient">
            <div class="nutrient-value" id="carbsVal">70.0</div>
            <div class="nutrient-label">углеводы, г</div>
          </div>
        </div>
      </div>

      <!-- Поля ввода -->
      <div class="input-group">
        <label>Сухие до варки (всего)</label>
        <div class="input-wrapper">
          <input type="number" id="dryTotal" placeholder="200" value="200" />
          <span class="input-unit">г</span>
        </div>
      </div>
      <div class="input-group">
        <label>Готовые после варки (всего)</label>
        <div class="input-wrapper">
          <input type="number" id="cookedTotal" placeholder="600" value="600" />
          <span class="input-unit">г</span>
        </div>
      </div>
      <div class="input-group">
        <label>Ваша порция (готовые)</label>
        <div class="input-wrapper">
          <input
            type="number"
            id="portionCooked"
            placeholder="250"
            value="250"
          />
          <span class="input-unit">г</span>
        </div>
      </div>

      <button class="btn btn-primary" id="calcBtn">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path stroke="none" d="M0 0h24v24H0z" fill="none" />
          <path
            d="M4 5a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v14a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2l0 -14"
          />
          <path
            d="M8 8a1 1 0 0 1 1 -1h6a1 1 0 0 1 1 1v1a1 1 0 0 1 -1 1h-6a1 1 0 0 1 -1 -1l0 -1"
          />
          <path d="M8 14l0 .01" />
          <path d="M12 14l0 .01" />
          <path d="M16 14l0 .01" />
          <path d="M8 17l0 .01" />
          <path d="M12 17l0 .01" />
          <path d="M16 17l0 .01" />
        </svg>
        Рассчитать порцию
      </button>

      <div class="action-row">
        <button class="btn btn-outline" id="scanBarcodeBtn">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
          >
            <path
              d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"
            />
            <rect x="7" y="7" width="4" height="4" rx="1" />
            <rect x="13" y="7" width="4" height="4" rx="1" />
            <rect x="7" y="13" width="4" height="4" rx="1" />
            <rect x="13" y="13" width="4" height="4" rx="1" />
          </svg>
          Сканер
        </button>
        <button class="btn btn-outline" id="searchProductBtn">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
          >
            <circle cx="10" cy="10" r="7" />
            <path d="M21 21L15 15" />
          </svg>
          Поиск
        </button>
      </div>

      <!-- Модальное окно результата -->
      <div id="resultModal" class="result-modal">
        <div class="result-modal-content">
          <button class="result-modal-close" id="resultModalCloseX">✕</button>
          <div class="result-modal-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 2L12 7" />
              <path d="M12 17L12 22" />
              <path d="M4.71 4.71L8.29 8.29" />
              <path d="M15.71 15.71L19.29 19.29" />
              <path d="M2 12L7 12" />
              <path d="M17 12L22 12" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </div>
          <div class="result-modal-label">СУХИХ МАКАРОН В ПОРЦИИ</div>
          <div class="result-modal-value">
            <span id="modalDryPortion">--</span>
            <span class="result-modal-unit">г</span>
          </div>
          <div class="result-modal-kbju" id="modalKbju"></div>
          <div class="result-modal-actions">
            <button
              id="modalCopyBtn"
              class="result-modal-btn result-modal-btn-primary"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="white"
                stroke-width="1.8"
                style="display: inline; margin-right: 8px"
              >
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path
                  d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
                ></path>
              </svg>
              Скопировать вес
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Модальное окно поиска/сканера -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <button class="modal-close" id="mainModalCloseX">✕</button>
        <h3 id="modalTitle">Поиск продукта</h3>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Введите название макарон или бренда..."
        />
        <div id="searchResults" class="search-results"></div>
        <div id="scannerContainer" style="display: none"></div>
      </div>
    </div>
    <!-- ФУТЕР -->
    <footer class="footer">
      <div class="footer-content">
        <div class="footer-logo">
          <img
            src="food-fusilli-pasta-reginette-svgrepo-com.svg"
            alt="logo"
            width="24"
            height="24"
          />
          <span>MacroCalc</span>
        </div>
        <div class="footer-links">
          <a
            href="https://github.com/Belozerovmi"
            target="_blank"
            rel="noopener noreferrer"
            class="footer-link"
          >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path
                d="M12 2C6.48 2 2 6.48 2 12c0 4.42 2.87 8.17 6.84 9.49.5.09.68-.21.68-.48 0-.24-.01-.88-.01-1.71-2.78.6-3.37-1.34-3.37-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1.01.07 1.54 1.03 1.54 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.26.1-2.62 0 0 .84-.27 2.75 1.02.8-.22 1.65-.33 2.5-.33.85 0 1.7.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.36.2 2.37.1 2.62.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.85 0 1.34-.01 2.42-.01 2.75 0 .27.18.58.69.48C19.13 20.17 22 16.42 22 12c0-5.52-4.48-10-10-10z"
              />
            </svg>
            GitHub
          </a>
        </div>
        <div class="footer-copyright">
          made by
          <a
            href="https://github.com/Belozerovmi"
            target="_blank"
            rel="noopener noreferrer"
            >belozerov</a
          >
        </div>
      </div>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
