<!DOCTYPE html>
<html lang="ru">
  <head>
    <link rel="stylesheet" href="style.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <title>MacroCalc — Калькулятор порций</title>
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="flex-between" style="margin-bottom: 8px">
        <a href="index.html">
          <img src="food-fusilli-pasta-reginette-svgrepo-com.svg" alt="logo" />
          <h1>MacroCalc</h1>
        </a>
      </div>
      <div class="subhead">Рассчитайте вес сухих макарон в порции</div>

      <!-- Карточка продукта -->
      <div class="product-card">
        <div class="product-name-row">
          <span class="product-name" id="productName"
            >Макароны (твёрдые сорта)</span
          >
          <button class="edit-link" id="editProductBtn">
            <svg
              class="icon-svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"
              />
            </svg>
            <!-- <span>Изменить</span> -->
          </button>
        </div>
        <div class="nutrients" id="nutrientsPanel">
          <div class="nutrient">
            <div class="nutrient-value" id="kcalVal">354</div>
            <div class="nutrient-label">ккал</div>
          </div>
          <div class="nutrient">
            <div class="nutrient-value" id="proteinVal">12.0</div>
            <div class="nutrient-label">белки, г</div>
          </div>
          <div class="nutrient">
            <div class="nutrient-value" id="fatVal">1.5</div>
            <div class="nutrient-label">жиры, г</div>
          </div>
          <div class="nutrient">
            <div class="nutrient-value" id="carbsVal">70.0</div>
            <div class="nutrient-label">углеводы, г</div>
          </div>
        </div>
      </div>

      <!-- Поля ввода -->
      <div class="input-group">
        <label>Сухие до варки (всего)</label>
        <div class="input-wrapper">
          <input type="number" id="dryTotal" placeholder="200" value="200" />
          <span class="input-unit">г</span>
        </div>
      </div>
      <div class="input-group">
        <label>Готовые после варки (всего)</label>
        <div class="input-wrapper">
          <input type="number" id="cookedTotal" placeholder="600" value="600" />
          <span class="input-unit">г</span>
        </div>
      </div>
      <div class="input-group">
        <label>Ваша порция (готовые)</label>
        <div class="input-wrapper">
          <input
            type="number"
            id="portionCooked"
            placeholder="250"
            value="250"
          />
          <span class="input-unit">г</span>
        </div>
      </div>

      <button class="btn btn-primary" id="calcBtn">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path stroke="none" d="M0 0h24v24H0z" fill="none" />
          <path
            d="M4 5a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v14a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2l0 -14"
          />
          <path
            d="M8 8a1 1 0 0 1 1 -1h6a1 1 0 0 1 1 1v1a1 1 0 0 1 -1 1h-6a1 1 0 0 1 -1 -1l0 -1"
          />
          <path d="M8 14l0 .01" />
          <path d="M12 14l0 .01" />
          <path d="M16 14l0 .01" />
          <path d="M8 17l0 .01" />
          <path d="M12 17l0 .01" />
          <path d="M16 17l0 .01" />
        </svg>
        Рассчитать порцию
      </button>

      <div class="action-row">
        <button class="btn btn-outline" id="scanBarcodeBtn">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
          >
            <path
              d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"
            />
            <rect x="7" y="7" width="4" height="4" rx="1" />
            <rect x="13" y="7" width="4" height="4" rx="1" />
            <rect x="7" y="13" width="4" height="4" rx="1" />
            <rect x="13" y="13" width="4" height="4" rx="1" />
          </svg>
          Сканер
        </button>
        <button class="btn btn-outline" id="searchProductBtn">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
          >
            <circle cx="10" cy="10" r="7" />
            <path d="M21 21L15 15" />
          </svg>
          Поиск
        </button>
      </div>

      <!-- <div class="result-card" id="resultBlock">
        <div class="result-label">СУХИХ МАКАРОН В ВАШЕЙ ПОРЦИИ</div>
        <div class="result-value" id="dryPortionResult">--</div>
        <div class="result-sub" id="caloriesResult"></div>
        <button id="copyBtn" class="copy-inline">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.8"
          >
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path
              d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
            ></path>
          </svg>
          Скопировать вес (г)
        </button>
      </div> -->
      <!-- Модальное окно результата (вместо result-card) -->
      <div id="resultModal" class="result-modal">
        <div class="result-modal-content">
          <div class="result-modal-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M12 2L12 7" />
              <path d="M12 17L12 22" />
              <path d="M4.71 4.71L8.29 8.29" />
              <path d="M15.71 15.71L19.29 19.29" />
              <path d="M2 12L7 12" />
              <path d="M17 12L22 12" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </div>
          <div class="result-modal-label">СУХИХ МАКАРОН В ПОРЦИИ</div>
          <div class="result-modal-value">
            <span id="modalDryPortion">--</span>
            <span class="result-modal-unit">г</span>
          </div>
          <div class="result-modal-kbju" id="modalKbju"></div>
          <div class="result-modal-actions">
            <button
              id="modalCopyBtn"
              class="result-modal-btn result-modal-btn-primary"
            >
              <svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="white"
                stroke-width="1.8"
                style="display: inline; margin-right: 8px"
              >
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path
                  d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
                ></path>
              </svg>
              Скопировать вес
            </button>
            <button
              id="modalCloseBtn"
              class="result-modal-btn result-modal-btn-secondary"
            >
              Закрыть
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Модальное окно -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <h3 id="modalTitle">Поиск продукта</h3>
        <input
          type="text"
          id="searchInput"
          class="search-input"
          placeholder="Введите название макарон или бренда..."
        />
        <div id="searchResults" class="search-results"></div>
        <div id="scannerContainer" style="display: none"></div>
        <button id="closeModal" class="btn close-modal">Закрыть</button>
      </div>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
